name: flutter_application_1
description: "Expense Tracker with Income & Monthly Insights"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  fl_chart: ^0.68.0

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0           # Required for all Firebase services
  firebase_auth: ^5.3.1           # For login / signup / auth state
  cloud_firestore: ^5.4.4         # For storing & syncing expenses in the cloud

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true